
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.search-bar {
  width: 100%;
  padding: 10px 14px;
  font-size: 15px;
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius);
  background: var(--surface-2);
  color: var(--text-primary);
  margin-bottom: 1rem;
}
.search-bar:focus { outline: 2px solid var(--border-accent); }
.tabs {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem;
}
.tab {
  padding: 5px 12px; border-radius: 999px; font-size: 13px; cursor: pointer;
  border: 0.5px solid var(--border); background: var(--surface-1);
  color: var(--text-secondary); transition: all 0.15s;
}
.tab.active {
  background: var(--bg-accent); color: var(--text-accent);
  border-color: var(--border-accent); font-weight: 500;
}
.grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px;
}
.card {
  background: var(--surface-2); border: 0.5px solid var(--border);
  border-radius: 12px; padding: 14px; cursor: pointer; transition: border-color 0.15s;
}
.card:hover { border-color: var(--border-strong); }
.card-icon { font-size: 22px; margin-bottom: 6px; }
.card-name { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 2px; }
.card-cat { font-size: 11px; color: var(--text-muted); }
.cat-header {
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
  margin: 1rem 0 0.5rem; display: flex; align-items: center; gap: 6px;
}
.count-badge {
  font-size: 11px; background: var(--surface-1); border: 0.5px solid var(--border);
  border-radius: 999px; padding: 1px 8px; color: var(--text-muted);
}
.empty { color: var(--text-muted); font-size: 14px; padding: 2rem 0; text-align: center; }
</style>

let activeTab = "All";
let searchVal = "";

const tabs = document.getElementById("tabs");
const content = document.getElementById("content");
const searchEl = document.getElementById("search");

function buildTabs() {
  const allBtn = document.createElement("button");
  allBtn.className = "tab active";
  allBtn.textContent = "All";
  allBtn.onclick = () => setTab("All");
  tabs.appendChild(allBtn);
  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "tab";
    btn.textContent = cat.emoji + " " + cat.name;
    btn.onclick = () => setTab(cat.name);
    tabs.appendChild(btn);
  });
}

function setTab(name) {
  activeTab = name;
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.textContent.includes(name) || (name === "All" && t.textContent === "All"));
  });
  render();
}

function render() {
  const q = searchVal.toLowerCase();
  let html = "";
  const filtered = categories
    .filter(cat => activeTab === "All" || cat.name === activeTab)
    .map(cat => ({
      ...cat,
      items: cat.items.filter(item => !q || item.toLowerCase().includes(q) || cat.name.toLowerCase().includes(q))
    }))
    .filter(cat => cat.items.length > 0);

  if (filtered.length === 0) {
    content.innerHTML = `<p class="empty">No items found for "<strong>${searchVal}</strong>"</p>`;
    return;
  }

  filtered.forEach(cat => {
    html += `<div class="cat-header">${cat.emoji} ${cat.name} <span class="count-badge">${cat.items.length}</span></div>`;
    html += `<div class="grid">`;
    cat.items.forEach(item => {
      html += `<div class="card"><div class="card-icon">${cat.emoji}</div><div class="card-name">${item}</div><div class="card-cat">${cat.name}</div></div>`;
    });
    html += `</div>`;
  });

  content.innerHTML = html;
}

searchEl.addEventListener("input", e => {
  searchVal = e.target.value;
  if (searchVal) { activeTab = "All"; document.querySelectorAll(".tab").forEach(t => t.classList.remove("active")); document.querySelector(".tab").classList.add("active"); }
  render();
});

buildTabs();
render();
