<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Item Category Browser</title>
  <meta name="description" content="Search and filter Minecraft items by category to find where to store them.">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="theme-dark">
  <div class="sky-background">
    <div class="sun"></div>
    <div class="moon"></div>
    <div class="stars"></div>
  </div>

  <div class="container">
    <header class="header">
      <div>
        <h1 class="title">Storage Browser</h1>
        <p class="subtitle">Find where your items belong.</p>
      </div>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Theme">
        <div class="toggle-track">
          <div class="toggle-thumb"></div>
        </div>
      </button>
    </header>

    <main>
      <div class="search-container">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input class="search-bar" type="text" id="search" placeholder="Search items… (e.g. iron, sword, sapling)" autocomplete="off" />
      </div>

      <nav class="tabs" id="tabs" aria-label="Category tabs"></nav>
      
      <div id="content" class="content-area"></div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
